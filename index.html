<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAU Heatmap</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f1015;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

    .header{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 28px 14px;border-bottom:1px solid #1e1e2a;
    }
    .header h1{font-size:1.2rem;font-weight:700;}
    .header-right{display:flex;align-items:center;gap:12px;}
    .logo{font-size:1.1rem;font-weight:700;color:#888;letter-spacing:-.02em;}

    /* ── LANG TOGGLE ── */
    .lang-toggle{
      display:flex;gap:0;border:1px solid #2a2a38;border-radius:7px;overflow:hidden;
    }
    .lang-btn{
      padding:4px 11px;font-size:0.73rem;font-weight:700;
      background:transparent;border:none;color:#555;cursor:pointer;transition:all .15s;
      letter-spacing:.03em;
    }
    .lang-btn.active{background:#1a1a24;color:#fff;}

    /* ── TABS ── */
    .tab-bar{
      display:flex;align-items:center;gap:0;
      padding:14px 28px 0;border-bottom:1px solid #1e1e2a;
    }
    .tab-btn{
      padding:8px 22px;border:none;background:transparent;
      color:#666;font-size:0.85rem;font-weight:600;cursor:pointer;
      border-bottom:2px solid transparent;margin-bottom:-1px;
      transition:all .18s;
    }
    .tab-btn:hover{color:#aaa;}
    .tab-btn.active{color:#fff;border-bottom-color:#fff;}

    .tab-panel{display:none;padding:18px 28px 40px;}
    .tab-panel.active{display:block;}

    /* ── CONTROLS ── */
    .ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    select{
      background:#1a1a24;border:1px solid #2a2a38;color:#fff;
      border-radius:6px;padding:5px 10px;font-size:0.8rem;cursor:pointer;
    }
    select:focus{outline:none;}
    .ctrl-label{font-size:0.78rem;color:#666;}
    .mode-wrap{display:flex;gap:0;border:1px solid #2a2a38;border-radius:7px;overflow:hidden;}
    .mode-btn{padding:5px 14px;font-size:0.75rem;font-weight:600;background:transparent;border:none;color:#555;cursor:pointer;transition:all .15s;}
    .mode-btn.active{background:#1a1a24;color:#fff;}

    /* ── TABLE ── */
    .tbl-wrap{overflow-x:auto;padding-bottom:6px;}
    table{border-collapse:collapse;white-space:nowrap;}
    table th{
      font-size:0.78rem;font-weight:600;color:#888;
      padding:7px 12px;text-align:center;border-bottom:1px solid #1e1e2a;
      border-right:1px solid #1e1e2a;
      background:#0f1015;position:sticky;top:0;z-index:2;
    }
    table th.th-time{text-align:left;min-width:68px;}
    table td{
      text-align:center;padding:8px 12px;
      font-size:0.82rem;font-weight:600;color:#fff;
      border-bottom:1px solid #0f1015;
      border-right:1px solid #0f1015;
      transition:filter .1s;cursor:default;
      min-width:72px;
    }
    table td:hover{filter:brightness(1.2);}
    table td.td-year{
      text-align:left;background:#0f1015!important;
      color:#888;font-size:0.8rem;font-weight:500;
      border-right:1px solid #1e1e2a;
      position:sticky;left:0;z-index:1;
    }
    table td.td-empty{background:#151520!important;color:#333!important;}
    table tr.tr-avg td{background:#181820!important;color:#aaa!important;font-size:0.78rem;}
    table tr.tr-avg td.td-year{color:#666!important;}
    table tr.tr-med td{background:#131318!important;color:#777!important;font-size:0.78rem;}
    table tr.tr-med td.td-year{color:#555!important;}

    /* ── UPLOAD ── */
    #upload-zone{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:calc(100vh - 57px);gap:14px;padding:40px;
    }
    .drop-box{
      border:2px dashed #2a2a38;border-radius:14px;padding:44px 60px;
      text-align:center;cursor:pointer;transition:all .2s;max-width:480px;width:100%;
    }
    .drop-box:hover,.drop-box.over{border-color:#ccc;background:rgba(255,255,255,.02);}
    .drop-icon{font-size:2.8rem;margin-bottom:10px;opacity:.45;}
    .drop-box h2{font-size:1rem;font-weight:600;margin-bottom:6px;}
    .drop-box p{font-size:0.78rem;color:#666;line-height:1.6;}
    .drop-box code{display:inline-block;margin-top:12px;padding:3px 10px;background:#1a1a24;border:1px solid #2a2a38;border-radius:5px;font-size:0.72rem;color:#888;}
    #file-input{display:none;}
    .btn-upload{margin-top:12px;padding:9px 26px;border:1px solid #2a2a38;border-radius:8px;background:#1a1a24;color:#fff;font-size:0.83rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
    .btn-upload:hover{opacity:.8;}
    .hint-txt{font-size:0.7rem;color:#444;}

    /* ── PROGRESS ── */
    #progress-zone{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      min-height:calc(100vh - 57px);gap:18px;
    }
    .prog-bar-wrap{width:300px;background:#1a1a24;border-radius:8px;height:5px;overflow:hidden;}
    .prog-bar{height:100%;background:#fff;border-radius:8px;width:0%;transition:width .08s;}
    .prog-label{font-size:0.82rem;color:#888;}

    /* ── DASHBOARD ── */
    #dashboard{display:none;}
    .stats-row{display:flex;gap:12px;flex-wrap:wrap;padding:14px 28px 0;}
    .stat{background:#111118;border:1px solid #1e1e2a;border-radius:10px;padding:10px 14px;min-width:100px;}
    .stat .sl{font-size:0.63rem;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .stat .sv{font-size:0.95rem;font-weight:700;}

    .global-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 28px 0;}

    /* ── TOOLTIP ── */
    #tooltip{
      display:none;position:fixed;z-index:9999;
      background:#1e1e2e;border:1px solid #2a2a3a;border-radius:8px;
      padding:8px 13px;pointer-events:none;
      box-shadow:0 4px 20px rgba(0,0,0,.6);white-space:nowrap;
    }
    #tt-lbl{font-size:0.7rem;color:#888;margin-bottom:3px;}
    #tt-val{font-size:1rem;font-weight:700;}
    #tt-sub{font-size:0.72rem;color:#666;margin-top:2px;}

    ::-webkit-scrollbar{height:5px;width:5px;}
    ::-webkit-scrollbar-track{background:#0f1015;}
    ::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px;}
  </style>
</head>
<body>

<div class="header">
  <h1 id="page-title">DAU Daily Heatmap</h1>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ko">한</button>
    </div>
    <span class="logo">PUBGM</span>
  </div>
</div>

<!-- UPLOAD -->
<div id="upload-zone">
  <div class="drop-box" id="drop-box">
    <div class="drop-icon">📊</div>
    <h2 data-i18n="upload_title">Drop your CSV file here</h2>
    <p data-i18n="upload_desc">Tab-separated or comma-separated.<br>UTF-16 / UTF-8 auto-detected.</p>
    <code>date &nbsp;·&nbsp; country &nbsp;·&nbsp; DAU</code><br/>
    <button class="btn-upload" id="btn-choose" onclick="document.getElementById('file-input').click()" data-i18n="upload_btn">Choose File</button>
    <input type="file" id="file-input" accept=".csv,.tsv,.txt"/>
  </div>
  <p class="hint-txt" data-i18n="upload_hint">Date formats: YYYY. M. D. &nbsp;|&nbsp; YYYY-MM-DD &nbsp;|&nbsp; MM/DD/YYYY</p>
</div>

<!-- PROGRESS -->
<div id="progress-zone">
  <div class="prog-label" id="prog-label">Reading…</div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="stats-row">
    <div class="stat"><div class="sl" data-i18n="stat_countries">Countries</div><div class="sv" id="s-countries">—</div></div>
    <div class="stat"><div class="sl" data-i18n="stat_range">Date Range</div><div class="sv" id="s-range">—</div></div>
    <div class="stat"><div class="sl" data-i18n="stat_records">Records</div><div class="sv" id="s-records">—</div></div>
    <div class="stat"><div class="sl" data-i18n="stat_peak">Peak Daily DAU</div><div class="sv" id="s-peak">—</div></div>
  </div>

  <div class="global-ctrl">
    <span class="ctrl-label" data-i18n="ctrl_view">View</span>
    <select id="sel-country">
      <option value="__global__" data-i18n="global_opt">🌐 Global (All Countries)</option>
    </select>
    <span class="ctrl-label" style="margin-left:6px" data-i18n="ctrl_mode">Mode</span>
    <div class="mode-wrap">
      <button class="mode-btn active" data-mode="change" data-i18n="mode_change">% Change</button>
      <button class="mode-btn" data-mode="abs" data-i18n="mode_abs">Absolute DAU</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="daily" data-i18n="tab_daily">Daily</button>
    <button class="tab-btn" data-tab="weekly" data-i18n="tab_weekly">Weekly</button>
    <button class="tab-btn" data-tab="monthly" data-i18n="tab_monthly">Monthly</button>
    <button class="tab-btn" data-tab="quarterly" data-i18n="tab_quarterly">Quarterly</button>
  </div>

  <!-- DAILY -->
  <div class="tab-panel active" id="tab-daily">
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="ctrl_month">Month</span>
      <select id="sel-month"></select>
    </div>
    <div class="tbl-wrap"><table id="tbl-daily"></table></div>
  </div>

  <!-- WEEKLY -->
  <div class="tab-panel" id="tab-weekly">
    <div class="tbl-wrap"><table id="tbl-weekly"></table></div>
  </div>

  <!-- MONTHLY -->
  <div class="tab-panel" id="tab-monthly">
    <div class="tbl-wrap"><table id="tbl-monthly"></table></div>
  </div>

  <!-- QUARTERLY -->
  <div class="tab-panel" id="tab-quarterly">
    <div class="tbl-wrap"><table id="tbl-quarterly"></table></div>
  </div>
</div>

<div id="tooltip"><div id="tt-lbl"></div><div id="tt-val"></div><div id="tt-sub"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  I18N
// ═══════════════════════════════════════════════════════════════
let LANG = 'en';

const T = {
  en: {
    upload_title:   'Drop your CSV file here',
    upload_desc:    'Tab-separated or comma-separated.<br>UTF-16 / UTF-8 auto-detected.',
    upload_btn:     'Choose File',
    upload_hint:    'Date formats: YYYY. M. D. &nbsp;|&nbsp; YYYY-MM-DD &nbsp;|&nbsp; MM/DD/YYYY',
    stat_countries: 'Countries',
    stat_range:     'Date Range',
    stat_records:   'Records',
    stat_peak:      'Peak Daily DAU',
    ctrl_view:      'View',
    ctrl_mode:      'Mode',
    ctrl_month:     'Month',
    global_opt:     '🌐 Global (All Countries)',
    mode_change:    '% Change',
    mode_abs:       'Absolute DAU',
    tab_daily:      'Daily',
    tab_weekly:     'Weekly',
    tab_monthly:    'Monthly',
    tab_quarterly:  'Quarterly',
    title_daily:    'DAU Daily Heatmap',
    title_weekly:   'DAU Weekly Heatmap',
    title_monthly:  'DAU Monthly Heatmap',
    title_quarterly:'DAU Quarterly Heatmap',
    col_time:       'Time',
    row_avg:        'Average',
    row_med:        'Median',
    no_data:        'No data loaded',
    reading:        'Reading file…',
    decoding:       'Decoding…',
    rendering:      'Rendering…',
    months_short:   ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    months_long:    ['January','February','March','April','May','June','July','August','September','October','November','December'],
    week_suffix:    (n) => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0])+' week'; },
    dau_label:      'DAU',
    chg_labels:     { month:'MoM', quarter:'QoQ', week:'WoW', day:'DoD' },
  },
  ko: {
    upload_title:   'CSV 파일을 드래그하여 놓으세요',
    upload_desc:    '탭 또는 쉼표 구분자.<br>UTF-16 / UTF-8 자동 감지.',
    upload_btn:     '파일 선택',
    upload_hint:    '날짜 형식: YYYY. M. D. &nbsp;|&nbsp; YYYY-MM-DD &nbsp;|&nbsp; MM/DD/YYYY',
    stat_countries: '국가 수',
    stat_range:     '날짜 범위',
    stat_records:   '레코드 수',
    stat_peak:      '최대 일별 DAU',
    ctrl_view:      '보기',
    ctrl_mode:      '모드',
    ctrl_month:     '월',
    global_opt:     '🌐 전체 국가',
    mode_change:    '% 변화',
    mode_abs:       'DAU 절대값',
    tab_daily:      '일별',
    tab_weekly:     '주별',
    tab_monthly:    '월별',
    tab_quarterly:  '분기별',
    title_daily:    'DAU 일별 히트맵',
    title_weekly:   'DAU 주별 히트맵',
    title_monthly:  'DAU 월별 히트맵',
    title_quarterly:'DAU 분기별 히트맵',
    col_time:       '기간',
    row_avg:        '평균',
    row_med:        '중앙값',
    no_data:        '데이터 없음',
    reading:        '파일 읽는 중…',
    decoding:       '디코딩 중…',
    rendering:      '렌더링 중…',
    months_short:   ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    months_long:    ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    week_suffix:    (n) => `${n}주차`,
    dau_label:      'DAU',
    chg_labels:     { month:'MoM', quarter:'QoQ', week:'WoW', day:'DoD' },
  },
};

function t(key) { return T[LANG][key] || T.en[key] || key; }

// Apply language to all [data-i18n] elements (static text)
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const val = t(key);
    if (el.tagName === 'P' || el.tagName === 'H2') el.innerHTML = val;
    else el.textContent = val;
  });
  // Rebuild month selector
  buildMonthSelector();
  // Re-render if data is loaded
  if (G.years.length) renderAll();
}

function buildMonthSelector() {
  const sel = document.getElementById('sel-month');
  const current = sel.value || '1';
  sel.innerHTML = '';
  T[LANG].months_long.forEach((name, i) => {
    const o = document.createElement('option');
    o.value = i + 1;
    o.textContent = name;
    sel.appendChild(o);
  });
  sel.value = current;
}

// Lang toggle
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.lang === LANG) return;
    LANG = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyLang();
    // Update page title based on active tab
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) {
      const tab = activeTab.dataset.tab;
      document.getElementById('page-title').textContent = t('title_' + tab);
    }
  });
});

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const G = {
  gMonthly:{}, gQuarterly:{}, gWeekly:{}, gDaily:{},
  cMonthly:{}, cQuarterly:{}, cWeekly:{}, cDaily:{},
  countries:[], years:[], mode:'change',
};

const TAB_TITLE_KEY = {
  daily:'title_daily', weekly:'title_weekly',
  monthly:'title_monthly', quarterly:'title_quarterly',
};

// ═══════════════════════════════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════════════════════════════
const dropBox = document.getElementById('drop-box');
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('over'));
dropBox.addEventListener('drop', e => { e.preventDefault(); dropBox.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  setProgress(t('reading'), 2);
  const r = new FileReader();
  r.onload = e => parseCSV(e.target.result);
  r.readAsArrayBuffer(file);
}
function setProgress(msg, pct) {
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('progress-zone').style.display = 'flex';
  document.getElementById('prog-label').textContent = msg;
  document.getElementById('prog-bar').style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════════════
//  PARSE
// ═══════════════════════════════════════════════════════════════
function parseDate(s) {
  s = s.trim();
  let m = s.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.?$/);
  if (m) return [+m[1], +m[2], +m[3]];
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return [+m[1], +m[2], +m[3]];
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return [+m[3], +m[1], +m[2]];
  return null;
}
function weekNum(y, mo, d) {
  const dt = new Date(y, mo - 1, d), j1 = new Date(y, 0, 1);
  return Math.ceil(((dt - j1) / 86400000 + j1.getDay() + 1) / 7);
}

function parseCSV(buffer) {
  setProgress(t('decoding'), 8);
  const u8 = new Uint8Array(buffer);
  let text;
  if (u8[0] === 0xFF && u8[1] === 0xFE) text = new TextDecoder('utf-16le').decode(buffer);
  else if (u8[0] === 0xFE && u8[1] === 0xFF) text = new TextDecoder('utf-16be').decode(buffer);
  else text = new TextDecoder('utf-8').decode(buffer);

  const lines = text.split('\n'), total = lines.length;
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const header = lines[0].trim().split(delim).map(h => h.trim().toLowerCase().replace(/\uFEFF/g, ''));
  let di = header.indexOf('date'), ci = header.indexOf('country'), vi = header.indexOf('dau');
  if (di < 0) di = 0; if (ci < 0) ci = 1; if (vi < 0) vi = 2;

  const CHUNK = 60000; let i = 1, parsed = 0, peakDaily = 0;
  const gM = {}, gQ = {}, gW = {}, gD = {};
  const cM = {}, cQ = {}, cW = {}, cD = {};
  const countrySet = new Set(), yearSet = new Set();

  function inc(o, k, v) { o[k] = (o[k] || 0) + v; }
  function incC(o, c, k, v) { if (!o[c]) o[c] = {}; o[c][k] = (o[c][k] || 0) + v; }

  function processChunk() {
    const end = Math.min(i + CHUNK, total);
    for (; i < end; i++) {
      const line = lines[i]; if (!line || !line.trim()) continue;
      const p = line.split(delim); if (p.length < 3) continue;
      const dt = parseDate(p[di]); if (!dt) continue;
      const country = (p[ci] || '').trim(); if (!country) continue;
      const dau = parseInt((p[vi] || '').trim(), 10);
      if (isNaN(dau) || dau < 0) continue;

      parsed++;
      if (dau > peakDaily) peakDaily = dau;
      const [y, mo, d] = dt;
      const mo2 = String(mo).padStart(2, '0'), d2 = String(d).padStart(2, '0');
      const mkey = `${y}-${mo2}`, qkey = `${y}-Q${Math.ceil(mo / 3)}`;
      const wkey = `${y}-W${String(weekNum(y, mo, d)).padStart(2, '0')}`, dkey = `${y}-${mo2}-${d2}`;

      countrySet.add(country); yearSet.add(y);
      inc(gM, mkey, dau); inc(gQ, qkey, dau); inc(gW, wkey, dau); inc(gD, dkey, dau);
      incC(cM, country, mkey, dau); incC(cQ, country, qkey, dau);
      incC(cW, country, wkey, dau); incC(cD, country, dkey, dau);
    }
    setProgress(`${LANG === 'ko' ? '파싱 중' : 'Parsing'} ${Math.round(i / total * 100)}%`, 8 + Math.round((i / total) * 75));
    if (i < total) { setTimeout(processChunk, 0); }
    else finalize(gM, gQ, gW, gD, cM, cQ, cW, cD, countrySet, yearSet, peakDaily, parsed);
  }
  setTimeout(processChunk, 20);
}

// ═══════════════════════════════════════════════════════════════
//  FINALIZE
// ═══════════════════════════════════════════════════════════════
// Convert daily sums → Average Daily (A.DAU) for monthly/quarterly/weekly
function computeAvgFromDaily(dailyData) {
  const monthly = {}, quarterly = {}, weekly = {};
  Object.entries(dailyData).forEach(([dkey, val]) => {
    const parts = dkey.split('-');
    const y = +parts[0], mo = +parts[1], d = +parts[2];
    const mkey = `${y}-${parts[1]}`;
    const qkey = `${y}-Q${Math.ceil(mo / 3)}`;
    const wnum = weekNum(y, mo, d);
    const wkey = `${y}-W${String(wnum).padStart(2, '0')}`;
    if (!monthly[mkey])   monthly[mkey]   = { sum: 0, cnt: 0 };
    if (!quarterly[qkey]) quarterly[qkey] = { sum: 0, cnt: 0 };
    if (!weekly[wkey])    weekly[wkey]    = { sum: 0, cnt: 0 };
    monthly[mkey].sum   += val; monthly[mkey].cnt++;
    quarterly[qkey].sum += val; quarterly[qkey].cnt++;
    weekly[wkey].sum    += val; weekly[wkey].cnt++;
  });
  const toAvg = obj => {
    const r = {};
    Object.entries(obj).forEach(([k, { sum, cnt }]) => r[k] = Math.round(sum / cnt));
    return r;
  };
  return { monthly: toAvg(monthly), quarterly: toAvg(quarterly), weekly: toAvg(weekly) };
}

function finalize(gM, gQ, gW, gD, cM, cQ, cW, cD, countrySet, yearSet, peakDaily, parsed) {
  setProgress(t('rendering'), 90);

  // Recompute monthly/quarterly/weekly as A.DAU (average daily) from daily data
  const gAvg = computeAvgFromDaily(gD);
  Object.keys(gAvg.monthly).forEach(k   => gM[k] = gAvg.monthly[k]);
  Object.keys(gAvg.quarterly).forEach(k => gQ[k] = gAvg.quarterly[k]);
  Object.keys(gAvg.weekly).forEach(k    => gW[k] = gAvg.weekly[k]);

  // Per-country A.DAU
  Object.keys(cD).forEach(country => {
    const avg = computeAvgFromDaily(cD[country]);
    if (!cM[country]) cM[country] = {};
    if (!cQ[country]) cQ[country] = {};
    if (!cW[country]) cW[country] = {};
    Object.keys(avg.monthly).forEach(k   => cM[country][k] = avg.monthly[k]);
    Object.keys(avg.quarterly).forEach(k => cQ[country][k] = avg.quarterly[k]);
    Object.keys(avg.weekly).forEach(k    => cW[country][k] = avg.weekly[k]);
  });

  Object.assign(G, {
    gMonthly: gM, gQuarterly: gQ, gWeekly: gW, gDaily: gD,
    cMonthly: cM, cQuarterly: cQ, cWeekly: cW, cDaily: cD,
  });
  G.years = [...yearSet].sort((a, b) => b - a);
  G.countries = [...countrySet].sort((a, b) => {
    const tA = Object.values(cM[a] || {}).reduce((s, v) => s + v, 0);
    const tB = Object.values(cM[b] || {}).reduce((s, v) => s + v, 0);
    return tB - tA;
  });

  const ySorted = [...yearSet].sort();
  document.getElementById('s-countries').textContent = G.countries.length;
  document.getElementById('s-range').textContent = `${ySorted[0]} – ${ySorted[ySorted.length - 1]}`;
  document.getElementById('s-records').textContent = parsed.toLocaleString();
  document.getElementById('s-peak').textContent = fmtNum(peakDaily);

  // Country selector (keep global option, add countries)
  const sel = document.getElementById('sel-country');
  // Remove old country options (keep first = global)
  while (sel.options.length > 1) sel.remove(1);
  G.countries.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
  });
  sel.addEventListener('change', renderAll);

  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      G.mode = btn.dataset.mode;
      renderAll();
    });
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      document.getElementById('page-title').textContent = t(TAB_TITLE_KEY[btn.dataset.tab]);
    });
  });

  // Month selector
  document.getElementById('sel-month').addEventListener('change', function () {
    renderDaily(+this.value);
  });

  renderAll();
  setTimeout(() => {
    document.getElementById('progress-zone').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }, 100);
}

// ═══════════════════════════════════════════════════════════════
//  DATA GETTERS
// ═══════════════════════════════════════════════════════════════
function getCountry() { return document.getElementById('sel-country').value; }
function getData(type) {
  const c = getCountry();
  const src = c === '__global__'
    ? { monthly: G.gMonthly, quarterly: G.gQuarterly, weekly: G.gWeekly, daily: G.gDaily }
    : { monthly: G.cMonthly[c] || {}, quarterly: G.cQuarterly[c] || {}, weekly: G.cWeekly[c] || {}, daily: G.cDaily[c] || {} };
  return src[type] || {};
}

// ═══════════════════════════════════════════════════════════════
//  COLOR
// ═══════════════════════════════════════════════════════════════
function changeColor(val) {
  if (val === null || val === undefined || isNaN(val)) return null;
  const t2 = Math.min(Math.abs(val) / 40, 1);
  const s = Math.round(35 + t2 * 60), l = Math.round(18 + t2 * 22);
  return val >= 0 ? `hsl(142,${s}%,${l}%)` : `hsl(0,${s}%,${l}%)`;
}
function absColor(val, maxVal) {
  if (!val || !maxVal) return null;
  const t2 = Math.min(val / maxVal, 1);
  const s = Math.round(35 + t2 * 60), l = Math.round(18 + t2 * 22);
  return `hsl(142,${s}%,${l}%)`;
}

// ═══════════════════════════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════════════════════════
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtChg(v) {
  if (v === null || v === undefined) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

// ═══════════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════════
const ttEl = document.getElementById('tooltip');
const ttLbl = document.getElementById('tt-lbl');
const ttVal = document.getElementById('tt-val');
const ttSub = document.getElementById('tt-sub');

function tip(el, label, primary, secondary) {
  el.addEventListener('mouseenter', e => {
    ttLbl.textContent = label;
    ttVal.textContent = primary;
    ttVal.style.color = primary.startsWith('+') ? '#4ade80' : primary.startsWith('-') ? '#f87171' : '#fff';
    ttSub.textContent = secondary || '';
    ttEl.style.display = 'block'; moveTip(e);
  });
  el.addEventListener('mousemove', moveTip);
  el.addEventListener('mouseleave', () => ttEl.style.display = 'none');
}
function moveTip(e) { ttEl.style.left = (e.clientX + 14) + 'px'; ttEl.style.top = (e.clientY - 50) + 'px'; }

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function weekLabel(n) { return T[LANG].week_suffix(n); }

function avgOf(arr) {
  const v = arr.filter(x => x !== null && x !== undefined && !isNaN(x));
  return v.length ? +(v.reduce((a, b) => a + b, 0) / v.length).toFixed(2) : null;
}
function medOf(arr) {
  const v = arr.filter(x => x !== null && x !== undefined && !isNaN(x)).sort((a, b) => a - b);
  if (!v.length) return null;
  const mid = Math.floor(v.length / 2);
  return +(v.length % 2 ? v[mid] : (v[mid - 1] + v[mid]) / 2).toFixed(2);
}

function buildChgMap(data, sortedKeys) {
  const chgMap = {};
  sortedKeys.forEach((k, i) => {
    if (i === 0) { chgMap[k] = null; return; }
    const prev = data[sortedKeys[i - 1]], curr = data[k];
    chgMap[k] = (prev && curr) ? +((curr - prev) / prev * 100).toFixed(2) : null;
  });
  return chgMap;
}

function addAvgMedRows(tbody, cols, colData) {
  const avgTr = tbody.insertRow(); avgTr.className = 'tr-avg';
  const ayt = avgTr.insertCell(); ayt.className = 'td-year'; ayt.textContent = t('row_avg');
  cols.forEach(col => {
    const td = avgTr.insertCell();
    const v = avgOf(colData[col] || []);
    if (v !== null) td.textContent = G.mode === 'change' ? fmtChg(v) : fmtNum(v);
  });

  const medTr = tbody.insertRow(); medTr.className = 'tr-med';
  const myt = medTr.insertCell(); myt.className = 'td-year'; myt.textContent = t('row_med');
  cols.forEach(col => {
    const td = medTr.insertCell();
    const v = medOf(colData[col] || []);
    if (v !== null) td.textContent = G.mode === 'change' ? fmtChg(v) : fmtNum(v);
  });
}

function makeCell(td, abs, chg, label, maxAbs) {
  if (!abs) { td.className = 'td-empty'; return null; }
  const bg = G.mode === 'change' ? changeColor(chg) : absColor(abs, maxAbs);
  // Always show A.DAU as the cell value; color changes based on mode
  const txt = fmtNum(abs);
  const secondary = chg !== null ? `ChG: ${fmtChg(chg)}` : '';
  td.style.background = bg || '#151520';
  td.textContent = txt;
  tip(td, label, fmtNum(abs) + ' A.DAU', secondary);
  return G.mode === 'change' ? chg : abs;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER: QUARTERLY
// ═══════════════════════════════════════════════════════════════
function renderQuarterly() {
  const data = getData('quarterly');
  const tbl = document.getElementById('tbl-quarterly');
  tbl.innerHTML = '';

  const allAbs = Object.values(data).filter(Boolean);
  const maxAbs = Math.max(...allAbs, 1);
  const chgMap = buildChgMap(data, Object.keys(data).sort());

  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  [t('col_time'), 'Q1', 'Q2', 'Q3', 'Q4'].forEach((h, i) => {
    const th = document.createElement('th'); th.textContent = h;
    if (i === 0) th.className = 'th-time'; hr.appendChild(th);
  });

  const tbody = tbl.createTBody();
  const colData = { 1: [], 2: [], 3: [], 4: [] };

  G.years.forEach(y => {
    const tr = tbody.insertRow();
    const ytd = tr.insertCell(); ytd.className = 'td-year'; ytd.textContent = y;
    [1, 2, 3, 4].forEach(q => {
      const td = tr.insertCell();
      const key = `${y}-Q${q}`;
      const v = makeCell(td, data[key], chgMap[key] !== undefined ? chgMap[key] : null, `${y} Q${q}`, maxAbs);
      if (v !== null) colData[q].push(v);
    });
  });

  addAvgMedRows(tbody, [1, 2, 3, 4], colData);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER: MONTHLY
// ═══════════════════════════════════════════════════════════════
function renderMonthly() {
  const data = getData('monthly');
  const MS = T[LANG].months_short;
  const tbl = document.getElementById('tbl-monthly');
  tbl.innerHTML = '';

  const allAbs = Object.values(data).filter(Boolean);
  const maxAbs = Math.max(...allAbs, 1);
  const chgMap = buildChgMap(data, Object.keys(data).sort());

  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  [t('col_time'), ...MS].forEach((h, i) => {
    const th = document.createElement('th'); th.textContent = h;
    if (i === 0) th.className = 'th-time'; hr.appendChild(th);
  });

  const tbody = tbl.createTBody();
  const colData = {};
  for (let mo = 1; mo <= 12; mo++) colData[mo] = [];

  G.years.forEach(y => {
    const tr = tbody.insertRow();
    const ytd = tr.insertCell(); ytd.className = 'td-year'; ytd.textContent = y;
    for (let mo = 1; mo <= 12; mo++) {
      const td = tr.insertCell();
      const key = `${y}-${String(mo).padStart(2, '0')}`;
      const label = `${y} ${T[LANG].months_long[mo - 1]}`;
      const v = makeCell(td, data[key], chgMap[key] !== undefined ? chgMap[key] : null, label, maxAbs);
      if (v !== null) colData[mo].push(v);
    }
  });

  addAvgMedRows(tbody, Array.from({ length: 12 }, (_, i) => i + 1), colData);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER: WEEKLY  (all years × all weeks)
// ═══════════════════════════════════════════════════════════════
function renderWeekly() {
  const data = getData('weekly');
  const tbl = document.getElementById('tbl-weekly');
  tbl.innerHTML = '';

  let maxWeek = 0;
  Object.keys(data).forEach(k => {
    const m = k.match(/-W(\d+)$/);
    if (m) maxWeek = Math.max(maxWeek, +m[1]);
  });
  if (!maxWeek) {
    tbl.innerHTML = `<tr><td style="color:#444;padding:20px">${t('no_data')}</td></tr>`;
    return;
  }
  const cols = Array.from({ length: maxWeek }, (_, i) => i + 1);

  const allAbs = Object.values(data).filter(Boolean);
  const maxAbs = Math.max(...allAbs, 1);

  const chgGrid = {}, absGrid = {};
  G.years.forEach(y => {
    chgGrid[y] = {}; absGrid[y] = {};
    for (let w = 1; w <= maxWeek; w++) {
      const key = `${y}-W${String(w).padStart(2, '0')}`;
      const abs = data[key] || null;
      absGrid[y][w] = abs;
      if (w > 1 && abs) {
        const prevKey = `${y}-W${String(w - 1).padStart(2, '0')}`;
        const prev = data[prevKey] || null;
        chgGrid[y][w] = prev ? +((abs - prev) / prev * 100).toFixed(2) : null;
      } else {
        chgGrid[y][w] = null;
      }
    }
  });

  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  const th0 = document.createElement('th'); th0.textContent = t('col_time'); th0.className = 'th-time'; hr.appendChild(th0);
  cols.forEach(w => {
    const th = document.createElement('th'); th.textContent = weekLabel(w); hr.appendChild(th);
  });

  const tbody = tbl.createTBody();
  const colData = {};
  cols.forEach(w => colData[w] = []);

  G.years.forEach(y => {
    const tr = tbody.insertRow();
    const ytd = tr.insertCell(); ytd.className = 'td-year'; ytd.textContent = y;
    cols.forEach(w => {
      const td = tr.insertCell();
      const label = LANG === 'ko' ? `${y}년 ${weekLabel(w)}` : `${y} Week ${w}`;
      const v = makeCell(td, absGrid[y][w], chgGrid[y][w], label, maxAbs);
      if (v !== null) colData[w].push(v);
    });
  });

  addAvgMedRows(tbody, cols, colData);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER: DAILY  (all years × days in month)
// ═══════════════════════════════════════════════════════════════
function renderDaily(month) {
  const data = getData('daily');
  const ML = T[LANG].months_long;
  const mm = String(month).padStart(2, '0');
  const tbl = document.getElementById('tbl-daily');
  tbl.innerHTML = '';

  if (!G.years.length) {
    tbl.innerHTML = `<tr><td style="color:#444;padding:20px">${t('no_data')}</td></tr>`;
    return;
  }

  const maxDays = Math.max(...G.years.map(y => new Date(y, month, 0).getDate()));
  const cols = Array.from({ length: maxDays }, (_, i) => i + 1);

  const monthKeys = Object.keys(data).filter(k => k.includes(`-${mm}-`));
  const allAbs = monthKeys.map(k => data[k]).filter(Boolean);
  const maxAbs = Math.max(...allAbs, 1);

  const chgGrid = {}, absGrid = {};
  G.years.forEach(y => {
    chgGrid[y] = {}; absGrid[y] = {};
    const nDays = new Date(y, month, 0).getDate();
    for (let d = 1; d <= nDays; d++) {
      const key = `${y}-${mm}-${String(d).padStart(2, '0')}`;
      const abs = data[key] || null;
      absGrid[y][d] = abs;
      if (d > 1 && abs) {
        const prevKey = `${y}-${mm}-${String(d - 1).padStart(2, '0')}`;
        const prev = data[prevKey] || null;
        chgGrid[y][d] = prev ? +((abs - prev) / prev * 100).toFixed(2) : null;
      } else {
        chgGrid[y][d] = null;
      }
    }
  });

  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  const th0 = document.createElement('th'); th0.textContent = t('col_time'); th0.className = 'th-time'; hr.appendChild(th0);
  cols.forEach(d => {
    const th = document.createElement('th');
    th.textContent = `${mm}-${String(d).padStart(2, '0')}`;
    hr.appendChild(th);
  });

  const tbody = tbl.createTBody();
  const colData = {};
  cols.forEach(d => colData[d] = []);

  G.years.forEach(y => {
    const nDays = new Date(y, month, 0).getDate();
    const tr = tbody.insertRow();
    const ytd = tr.insertCell(); ytd.className = 'td-year'; ytd.textContent = y;
    cols.forEach(d => {
      const td = tr.insertCell();
      if (d > nDays) { td.className = 'td-empty'; return; }
      const label = LANG === 'ko'
        ? `${y}년 ${ML[month - 1]} ${d}일`
        : `${y} ${ML[month - 1]} ${d}`;
      const v = makeCell(td, absGrid[y][d], chgGrid[y][d], label, maxAbs);
      if (v !== null) colData[d].push(v);
    });
  });

  addAvgMedRows(tbody, cols, colData);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  renderQuarterly();
  renderMonthly();
  renderWeekly();
  renderDaily(+document.getElementById('sel-month').value);
}

// ── INIT ── build month selector on load
buildMonthSelector();
</script>
